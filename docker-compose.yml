services:
  db:
    image: postgres:17-alpine
    container_name: octo-db
    environment:
      POSTGRES_USER: octo
      POSTGRES_PASSWORD: octo
      POSTGRES_DB: octo
    ports:
      - "5432:5432"
    volumes:
      - octo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octo"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional DB UI — `docker compose up adminer` — http://localhost:8081
  adminer:
    image: adminer:latest
    container_name: octo-adminer
    ports:
      - "8081:8080"
    depends_on:
      - db
    profiles: ["tools"]

volumes:
  octo_pgdata:
